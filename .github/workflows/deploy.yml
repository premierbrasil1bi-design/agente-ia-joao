name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "==== Deploy iniciado ===="

            cd ~/agente-ia-joao
            git pull origin main

            echo "==== Deploy BACKEND ===="
            cd backend
            npm install
            pm2 reload agente-backend || pm2 start index.js --name agente-backend

            echo "==== Build FRONTEND ===="
            cd ~/agente-ia-joao/frontend/client-app
            npm install
            npm run build

            echo "==== Publicação segura do FRONTEND ===="
            rm -rf /var/www/app_new
            mkdir -p /var/www/app_new

            cp -r dist/* /var/www/app_new/

            rm -rf /var/www/app/*
            cp -r /var/www/app_new/* /var/www/app/

            echo "==== Reiniciando Nginx ===="
            systemctl restart nginx

            echo "==== DEPLOY FINALIZADO COM SUCESSO ===="
