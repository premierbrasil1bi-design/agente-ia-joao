name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/agente-ia-joao
            git pull origin main

            # Update backend
            cd backend
            npm install
            pm2 restart agente-backend

            # Build frontend
            cd ../frontend/saas-admin
            npm install
            npm run build

            # Publish frontend
            rm -rf /var/www/saas-admin/*
            cp -r dist/* /var/www/saas-admin/

            # Reload nginx
            systemctl reload nginx
