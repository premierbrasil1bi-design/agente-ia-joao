# Evolution + PostgreSQL + Redis (produção SaaS)
#
# Postgres: POSTGRES_USER/PASSWORD/DB alinhados às URIs da Evolution.
# Evolution: atendai/evolution-api — Prisma usa DATABASE_CONNECTION_URI (sem DATABASE_URL duplicado).
#
# Reset dev (apaga dados): docker compose down -v && docker compose pull && docker compose up -d

version: '3.9'

services:
  saas_postgres:
    image: postgres:15
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  saas_redis:
    image: redis:7
    container_name: saas_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"

  saas_evolution:
    image: atendai/evolution-api:latest
    container_name: saas_evolution
    restart: always
    depends_on:
      saas_postgres:
        condition: service_healthy
      saas_redis:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/evolution-entrypoint.sh"]
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@saas_postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://saas_redis:6379/1
      AUTHENTICATION_API_KEY: default_key
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store
      - ./docker/evolution/entrypoint.sh:/evolution-entrypoint.sh:ro

volumes:
  postgres_data:
  evolution_store:
