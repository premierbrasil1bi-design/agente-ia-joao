# Evolution + PostgreSQL + Redis + API Node (produção SaaS)
#
# Postgres: imagem ankane/pgvector:latest (CREATE EXTENSION vector nas migrations do backend).
# Se o volume postgres_data foi criado com postgres oficial (sem pgvector), recrie-o uma vez:
#   docker compose down -v && docker compose up -d --build
# Caso contrário o erro SQLSTATE 0A000 ("extension vector is not available") persiste no dado antigo.
# Validar extensão após subir: docker compose exec saas_postgres psql -U postgres -d evolution -c "SELECT extname FROM pg_extension WHERE extname = 'vector';"
#
# POSTGRES_USER/PASSWORD/DB alinhados às URIs da Evolution e ao backend.
# Evolution: atendai/evolution-api — Prisma usa DATABASE_CONNECTION_URI (sem DATABASE_URL duplicado).
# saas_backend: API + worker BullMQ na rede Docker (REDIS_URL → saas_redis; Postgres interno sem TLS).
#
# Reset dev (apaga dados): docker compose down -v && docker compose pull && docker compose up -d

version: '3.9'

services:
  saas_postgres:
    image: ankane/pgvector:latest
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "evolution"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  saas_redis:
    image: redis:7
    container_name: saas_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"

  saas_evolution:
    image: atendai/evolution-api:latest
    container_name: saas_evolution
    restart: always
    depends_on:
      saas_postgres:
        condition: service_healthy
      saas_redis:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/evolution-entrypoint.sh"]
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://postgres:postgres@saas_postgres:5432/evolution"

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://saas_redis:6379/1"

      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "default_key"

      SERVER_TYPE: "http"
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"

      LOG_LEVEL: "INFO"
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store
      - ./docker/evolution/entrypoint.sh:/evolution-entrypoint.sh:ro

  saas_backend:
    build: ./backend
    container_name: saas_backend
    restart: always
    depends_on:
      saas_postgres:
        condition: service_healthy
      saas_redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://saas_redis:6379
      DATABASE_URL: "postgresql://postgres:postgres@saas_postgres:5432/evolution?sslmode=disable"
      EVOLUTION_API_URL: http://saas_evolution:8080
      EVOLUTION_API_KEY: default_key
    ports:
      - "3000:3000"
    env_file:
      - path: ./backend/.env
        required: false

volumes:
  postgres_data:
  evolution_store:
