# Evolution API: imagem com tag fixa (ex.: v2.3.7), nunca "latest", para builds reproduzíveis e menos surpresas em produção.
# Redis: dentro da rede Docker o host é o NOME DO SERVIÇO (aqui "redis"), não localhost — localhost seria o próprio container da Evolution.
# Debug sem Redis: descomente/ajuste no bloco saas_evolution — CACHE_REDIS_ENABLED=false e CACHE_LOCAL_ENABLED=true.

version: '3.9'

services:
  saas_postgres:
    image: postgres:15
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: saas_redis
    restart: always
    ports:
      - "6379:6379"

  saas_evolution:
    image: atendai/evolution-api:v2.3.7
    container_name: saas_evolution
    restart: always
    depends_on:
      saas_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@saas_postgres:5432/evolution
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: EVOLUTION_2026_JOAO_998877
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      # Debug (caso Redis cause erro): use CACHE_REDIS_ENABLED=false e CACHE_LOCAL_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store

volumes:
  postgres_data:
  evolution_store:
