# Redis desativado temporariamente devido a instabilidade da Evolution API
# Usando CACHE_LOCAL_ENABLED=true para garantir funcionamento estável
# Após validação do sistema, Redis pode ser reativado

version: '3.9'

services:
  saas_postgres:
    image: postgres:15
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: saas_redis
    restart: always
    ports:
      - "6379:6379"

  saas_evolution:
    image: atendai/evolution-api:latest
    container_name: saas_evolution
    restart: always
    depends_on:
      saas_postgres:
        condition: service_healthy
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@saas_postgres:5432/evolution
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=EVOLUTION_2026_JOAO_998877
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store

volumes:
  postgres_data:
  evolution_store:
