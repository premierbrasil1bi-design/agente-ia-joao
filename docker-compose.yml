# Evolution + PostgreSQL (produção SaaS)
#
# Prisma P1000 / Evolution não sobe:
# - Bug conhecido: .env interno da imagem sobrescreve env do Compose (EvolutionAPI#1474).
# - Volume Postgres antigo sem role `evolution` → "password authentication failed".
#
# O que este compose + entrypoint fazem:
# - Healthcheck Postgres + depends_on: service_healthy
# - Usuário dedicado evolution / evolution123 (init em docker/postgres-init — só na 1ª criação do volume)
# - Entrypoint: remove .env legados, grava .env canônico espelhando o Compose, testa auth com `pg`
#
# DATABASE_CONNECTION_URI é a variável que o Prisma da Evolution v2 lê (não use só DATABASE_URL).
#
# MIGRAÇÃO de volume antigo (postgres:postgres):
#   docker compose exec saas_postgres psql -U postgres -d evolution -c "CREATE ROLE evolution LOGIN PASSWORD 'evolution123';"
#   ... GRANTs (ver 01-evolution-app-user.sql) OU docker compose down -v (apaga dados) e subir de novo.
#
# Reset completo (dev): docker compose down -v && docker compose pull && docker compose up -d

version: '3.9'

services:
  saas_postgres:
    image: postgres:15
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: saas_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"

  saas_evolution:
    # Pin opcional: substitua :latest por digest/tag estável após um pull que funcione.
    image: atendai/evolution-api:latest
    container_name: saas_evolution
    restart: always
    depends_on:
      saas_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/evolution-entrypoint.sh"]
    environment:
      PGHOST: saas_postgres
      PGPORT: "5432"
      # Obrigatório para persistência Prisma (doc v2)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_CLIENT_NAME: evolution_saas
      # Host = nome do serviço Docker (saas_postgres). Mesma URI no Compose e no .env gerado no boot.
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@saas_postgres:5432/evolution?schema=public&connection_limit=5&pool_timeout=20&connect_timeout=30
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: EVOLUTION_2026_JOAO_998877
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution_saas
      CACHE_LOCAL_ENABLED: "false"
      # Segundos de espera após TCP antes do teste pg + Node (ajuste se o DB for lento)
      POSTGRES_STABILIZE_SEC: "10"
      # true = remove node_modules/.prisma no boot (útil se trocou DATABASE_* e o client ficou cacheado)
      CLEAR_PRISMA_CLIENT_CACHE: "false"
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store
      - ./docker/evolution/entrypoint.sh:/evolution-entrypoint.sh:ro

volumes:
  postgres_data:
  evolution_store:
