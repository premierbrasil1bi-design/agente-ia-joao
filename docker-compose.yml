# Evolution + PostgreSQL + Redis + API Node (produção SaaS)
#
# Postgres: imagem ankane/pgvector:latest (CREATE EXTENSION vector nas migrations do backend).
# Se o volume postgres_data foi criado com postgres oficial (sem pgvector), recrie-o uma vez:
#   docker compose down -v && docker compose up -d --build
# Caso contrário o erro SQLSTATE 0A000 ("extension vector is not available") persiste no dado antigo.
# Validar extensão após subir: docker compose exec saas_postgres psql -U postgres -d evolution -c "SELECT extname FROM pg_extension WHERE extname = 'vector';"
#
# POSTGRES_USER/PASSWORD/DB alinhados às URIs da Evolution e ao backend.
# Evolution: imagem e versão detalhadas no bloco saas_evolution (Prisma usa DATABASE_CONNECTION_URI).
# saas_backend: API + worker BullMQ na rede Docker (REDIS_URL → saas_redis; Postgres interno sem TLS).
#
# Reset dev (apaga dados): docker compose down -v && docker compose pull && docker compose up -d

version: '3.9'

services:
  saas_postgres:
    image: ankane/pgvector:latest
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "evolution"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  saas_redis:
    image: redis:7
    container_name: saas_redis
    restart: always

  # WAHA — WhatsApp HTTP API (provider=waha no OMNIA). Host 3099 evita conflito com API Node na 3000 (PM2).
  # Persistência: volume em ./waha_sessions.
  #
  # IMPORTANTE:
  # Após alterar este arquivo (ou variáveis de ambiente do WAHA), executar:
  #   docker compose down -v
  #   docker compose up -d
  #
  saas_waha:
    image: devlikeapro/waha:latest
    container_name: saas_waha
    environment:
      - WAHA_API_KEY=OMNIA_SECURE_9X7A_2026_JOAO
      - HOST=0.0.0.0
      - PORT=3000
      - WAHA_HOST=0.0.0.0
      - NODE_ENV=production
      - NEST_HOST=0.0.0.0
    ports:
      - "3099:3000"
    volumes:
      - ./waha_sessions:/app/.sessions
    restart: always

  # Evolution API: trocado de evoapicloud/evolution-api:v2.2.3 para atendai/evolution-api:v2.1.1 porque a
  # v2.2.3 falhava na criação de instâncias (erro interno ao ler connectionStatus.state indefinido). A v2.1.1
  # (atendai) mantém integração estável com WHATSAPP-BAILEYS (Baileys) e fluxo de QR/pairing sem impactar Neon/Redis.
  saas_evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: saas_evolution
    restart: always
    entrypoint: ["/bin/sh", "/evolution-entrypoint.sh"]
    environment:
      SERVER_TYPE: "http"
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      SERVER_URL: "https://evolution.omnia1biai.com.br"

      CORS_ORIGIN: "*"
      CORS_METHODS: "POST,GET,PUT,DELETE"
      CORS_CREDENTIALS: "true"

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_URL: "postgresql://neondb_owner:npg_JC9VIyrMFo1U@ep-wandering-paper-ahogquzh.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      DATABASE_CONNECTION_URI: "postgresql://neondb_owner:npg_JC9VIyrMFo1U@ep-wandering-paper-ahogquzh.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://saas_redis:6379/1"

      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "EVOLUTION_2026_JOAO_998877"

      LOG_LEVEL: "INFO"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1025062854"
    ports:
      - "8080:8080"
    volumes:
      # Sessões/auth stores da Evolution (atendai v2.x usa em geral /evolution/store — manter após restart).
      # Se a imagem documentar outro path (ex.: instances), adicione volume adicional alinhado à doc da tag usada.
      - evolution_store:/evolution/store
      - ./docker/evolution/entrypoint.sh:/evolution-entrypoint.sh:ro

  saas_backend:
    build: ./backend
    container_name: saas_backend
    command: ["node", "server.js"]
    depends_on:
      saas_postgres:
        condition: service_healthy
      saas_redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DB_BOOTSTRAP_MODE: safe
      REDIS_HOST: saas_redis
      REDIS_PORT: 6379
      DATABASE_URL: "postgresql://neondb_owner:npg_JC9VIyrMFo1U@ep-wandering-paper-ahogquzh.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      # Alinhar com AUTHENTICATION_API_KEY do saas_evolution (fallback se EVOLUTION_API_KEY não existir no .env).
      AUTHENTICATION_API_KEY: EVOLUTION_2026_JOAO_998877
      EVOLUTION_API_URL: http://saas_evolution:8080
      EVOLUTION_API_KEY: EVOLUTION_2026_JOAO_998877
      # Mesma chave do serviço saas_waha — obrigatório para header X-Api-Key (evita 401).
      WAHA_API_KEY: OMNIA_SECURE_9X7A_2026_JOAO
      WAHA_BASE_URL: http://saas_waha:3000
      WAHA_API_URL: http://saas_waha:3000
      WAHA_USERNAME: admin
      WAHA_PASSWORD: 41acf66c2f5b47d191d821f59b9b5d66
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

volumes:
  postgres_data:
  evolution_store:
