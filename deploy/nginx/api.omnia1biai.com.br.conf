# Referência para o servidor Linux: copiar/ajustar em
# /etc/nginx/sites-enabled/api.omnia1biai.com.br
#
# CORS: o backend Node (server.js) já aplica cors + credentials.
# Não use add_header Access-Control-* no Nginx no MESMO fluxo, senão o browser
# recebe headers duplicados e o preflight falha. Mantenha só proxy aqui.
#
# Depois de validar:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name api.omnia1biai.com.br;

    # ssl_certificate     /etc/letsencrypt/live/api.omnia1biai.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.omnia1biai.com.br/privkey.pem;

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Opcional (somente se o Node NÃO enviar CORS — evite duplicar):
        # add_header Access-Control-Allow-Origin https://app.omnia1biai.com.br always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        # add_header Access-Control-Allow-Credentials true always;
        # if ($request_method = OPTIONS) { return 204; }
    }
}
