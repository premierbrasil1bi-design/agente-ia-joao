# Snippet para o host evolution.omnia1biai.com.br — Evolution Manager (UI) sem enviar apikey no browser.
# Ajuste o upstream se o container não estiver em 127.0.0.1:8080.
#
# Segurança: em produção, prefira gerar este ficheiro no deploy a partir de secret (mesmo valor que
# AUTHENTICATION_API_KEY / EVOLUTION_API_KEY), em vez de commitar a chave em texto claro.

server {
    listen 443 ssl http2;
    server_name evolution.omnia1biai.com.br;

    # ssl_certificate / ssl_certificate_key — configurar no servidor

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header apikey EVOLUTION_2026_JOAO_998877;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
