# evolution.omnia1biai.com.br — Evolution API (atendai/evolution-api) atrás do Nginx.
#
# Rota oficial (Evolution API v2.1.x, doc): GET /instance/fetchInstances (header apikey).
# Se TODAS as chamadas /instance/* retornam 404 no browser mas o container responde no host:
#   → quase sempre o Nginx está servindo SPA estático em location / com try_files,
#     e as rotas da API caem no index.html (ou 404). Solução: blocos ^~ abaixo ANTES do location /.
#
# No docker-compose deste repo: container saas_evolution, porta publicada 8080:8080.
# Ajuste o upstream se a Evolution não estiver em 127.0.0.1:8080.
#
# Segurança: substitua a apikey por referência a arquivo include ou variável gerada no deploy.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name evolution.omnia1biai.com.br;

    # ssl_certificate / ssl_certificate_key / include options-ssl-nginx.conf / ssl_dhparam — no servidor (Certbot)

    # API Evolution — prioridade sobre qualquer SPA em location /
    location ^~ /instance/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header apikey EVOLUTION_2026_JOAO_998877;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # WebSocket (Socket.IO), se usado pela Evolution / manager
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header apikey EVOLUTION_2026_JOAO_998877;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Demais rotas da API (webhook, message, etc.) — mesmo upstream
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header apikey EVOLUTION_2026_JOAO_998877;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
